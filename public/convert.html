<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KML to Coverage Converter | Unwired</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Work Sans', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
    }
    h1 {
      font-family: 'Lexend', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p.desc {
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1rem;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .drop-zone .label {
      font-size: 1rem;
      color: #444;
    }
    .drop-zone .hint {
      font-size: 0.85rem;
      color: #999;
      margin-top: 0.5rem;
    }
    .file-name {
      font-weight: 500;
      color: #2563eb;
      margin-bottom: 1rem;
    }
    button {
      font-family: 'Lexend', sans-serif;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .status.success { background: #f0fdf4; color: #166534; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .status.working { background: #eff6ff; color: #1e40af; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>KML Coverage Converter</h1>
    <p class="desc">Upload a KML file to convert it to coverage.json for the address checker.</p>

    <div class="drop-zone" id="drop-zone">
      <div class="label">Drop your .kml file here or click to browse</div>
      <div class="hint">Accepts .kml files up to 50 MB</div>
    </div>
    <input type="file" id="file-input" accept=".kml">

    <div class="file-name" id="file-name" hidden></div>

    <button id="convert-btn" disabled>Convert &amp; Download</button>

    <div class="status" id="status" hidden></div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileNameEl = document.getElementById('file-name');
    const convertBtn = document.getElementById('convert-btn');
    const statusEl = document.getElementById('status');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) selectFile(fileInput.files[0]);
    });

    function selectFile(file) {
      if (!file.name.endsWith('.kml')) {
        showStatus('Please select a .kml file.', 'error');
        return;
      }
      selectedFile = file;
      fileNameEl.textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(2) + ' MB)';
      fileNameEl.hidden = false;
      convertBtn.disabled = false;
      statusEl.hidden = true;
    }

    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      convertBtn.disabled = true;
      showStatus('Reading and converting...', 'working');

      try {
        const kml = await selectedFile.text();
        const resp = await fetch('/api/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ kml }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.error || 'Conversion failed');
        }

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'coverage.json';
        a.click();
        URL.revokeObjectURL(url);

        const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
        showStatus('Done! coverage.json downloaded (' + sizeMB + ' MB)', 'success');
      } catch (err) {
        showStatus('Error: ' + err.message, 'error');
      } finally {
        convertBtn.disabled = false;
      }
    });

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
      statusEl.hidden = false;
    }
  </script>
</body>
</html>
